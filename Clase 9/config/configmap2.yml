apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-files
  namespace: default
data:
  # Archivo de configuración completo embebido como clave
  app.properties: |
    server.port=8080
    server.host=0.0.0.0
    log.level=info
    log.format=json
    cache.ttl=300

  nginx.conf: |
    server {
      listen 80;
      server_name localhost;

      location / {
        proxy_pass http://app-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
    }