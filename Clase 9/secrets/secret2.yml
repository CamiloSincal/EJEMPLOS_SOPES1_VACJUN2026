apiVersion: v1
kind: Secret
metadata:
  name: app-secret-plain
  namespace: default
type: Opaque
stringData:
  # stringData acepta texto plano — Kubernetes lo codifica a base64 internamente
  # Útil para manifiestos legibles en desarrollo (NO commitear en producción)
  DB_USER: "mi_usuario"
  DB_PASSWORD: "super_secret_123"
  API_KEY: "abcdefghijklmnop"

  # También soporta archivos completos
  connection.env: |
    DB_HOST=postgres-svc.default.svc.cluster.local
    DB_PORT=5432
    DB_NAME=mi_base_de_datos
    DB_USER=mi_usuario
    DB_PASSWORD=super_secret_123