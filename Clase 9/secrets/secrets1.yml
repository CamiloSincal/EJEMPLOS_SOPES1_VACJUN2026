apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: default
type: Opaque       # tipo genérico para credenciales arbitrarias
data:
  # Los valores DEBEN estar codificados en base64
  # Ejemplo: echo -n "mi_usuario" | base64  →  bWlfdXN1YXJpbw==
  DB_USER: bWlfdXN1YXJpbw==         # "mi_usuario"
  DB_PASSWORD: c3VwZXJfc2VjcmV0XzEyMw==  # "super_secret_123"
  API_KEY: YWJjZGVmZ2hpamtsbW5vcA==      # "abcdefghijklmnop"