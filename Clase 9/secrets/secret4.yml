apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-app-con-secrets
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-app
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      # Permite al pod hacer pull desde un registry privado
      imagePullSecrets:
      - name: registry-secret

      containers:
      - name: mi-app
        image: registry.example.com/mi-app:latest
        ports:
        - containerPort: 8080

        # --- Opción A: variables individuales desde el Secret ---
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD

        # --- Opción B: todas las claves del Secret como variables de entorno ---
        envFrom:
        - secretRef:
            name: app-secret

        # --- Opción C: montar el Secret como archivo en un volumen ---
        volumeMounts:
        - name: secret-vol
          mountPath: /etc/app/secrets    # los archivos quedan aquí, permisos 0400
          readOnly: true

      volumes:
      - name: secret-vol
        secret:
          secretName: app-secret-plain
          items:
          - key: connection.env
            path: connection.env         # /etc/app/secrets/connection.env
          defaultMode: 0400              # solo lectura para el propietario